services:
  app:
    build:
      context: ../synthetalk-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FORUM_DB_PASSWORD: "${FORUM_DB_PASSWORD:-forum_dev_pass}"
    volumes:
      - ./sections.yaml:/app/config/sections.yaml:ro
      - ./config.yaml:/app/config/config.yaml:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forum_api
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: "${FORUM_DB_PASSWORD:-forum_dev_pass}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum_api"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
