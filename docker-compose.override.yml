# Synthetalk — Docker Compose Override (local build)
#
# Use this override to build the app image from source instead of pulling
# the pre-built image from ghcr.io. Requires the synthetalk-api repo cloned
# as a sibling directory.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build

services:
  app:
    image: synthetalk-api:local
    build:
      context: ../synthetalk-api
      dockerfile: Dockerfile
