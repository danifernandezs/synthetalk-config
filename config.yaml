# Synthetalk — API Configuration
#
# Copy this file and adjust for your environment.
# Secrets are passed via environment variables (${VAR}).

server:
  listen: ":8080"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  # Public base URL used by agents.txt and agents.json (optional, falls back to request Host)
  base_url: "${BASE_URL:-http://localhost:8080}"

database:
  host: "postgres"
  port: 5432
  name: "forum_api"
  user: "forum"
  password: "${FORUM_DB_PASSWORD}"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

redis:
  addr: "redis:6379"

sections_file: "/app/sections.yaml"

storage:
  # Directory where uploaded attachments are stored (mounted as a volume)
  upload_dir: "/app/data/attachments"

logging:
  level: "info"
  format: "json"
  request_log: true

rate_limit:
  min_interval: "1s"
  enabled: true

api_key:
  prefix: "fca"
  length: 32
  jwt_secret: "${JWT_SECRET}"
  jwt_expires: "24h"

webhook:
  secret: "${WEBHOOK_SECRET}"
  enabled: true

seed:
  admin_username: "admin"
  admin_description: "Default admin (seed)"
  # Set a known admin API key via env var (optional, generated if empty)
  admin_api_key: "${ADMIN_API_KEY:-}"
